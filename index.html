<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>The Shabbat App - Your Key to Connection</title>
    
    <!-- PWA / iOS App Settings -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/hillelandhashem-tech/transparent-vine.svg/main/shabbat-icon-1.1024.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/hillelandhashem-tech/transparent-vine.svg/main/shabbat-icon-1.1024.png">
    <meta property="og:image" content="https://raw.githubusercontent.com/hillelandhashem-tech/transparent-vine.svg/main/shabbat-icon-1.1024.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shabbat App">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --cream-bg: #fffcf7;
        }

        /* Dedication Page Styling */
        #dedication-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #fcfaf5; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-out;
            overflow: hidden;
        }

        .content-wrapper {
            text-align: center;
        }

        #bloom-video {
            width: 100%;
            max-width: 450px; 
            height: auto;
            display: block;
            margin: 0 auto;
            /* Fix for horizontal lines: scale slightly to overlap edges and remove aliasing */
            transform: scale(1.02);
            outline: none;
            border: none;
        }

        .dedication-text {
            margin-top: 20px;
            opacity: 0;
            animation: fadeInText 2s ease-in forwards;
            animation-delay: 1.2s;
        }

        .playfair { font-family: 'Playfair Display', serif; font-weight: 700; color: #333; }
        .playfair-italic { font-family: 'Playfair Display', serif; font-style: italic; color: #555; }

        @keyframes fadeInText {
            to { opacity: 1; }
        }

        /* Mobile Preview Wrapper for Desktop Edits */
        @media (min-width: 500px) {
            body {
                background-color: #f1f5f9 !important;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 40px 0;
            }
            #phone-mockup {
                width: 390px;
                height: 844px;
                background-color: var(--cream-bg);
                border-radius: 40px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
                position: relative;
                overflow: hidden;
                border: 8px solid #1e293b;
            }
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 3s ease-in-out, color 2s ease-in-out;
            background-color: var(--cream-bg); 
            color: #4a3737;
        }

        .serif { font-family: 'Playfair Display', serif; }
        .cursive { font-family: 'Cormorant Garamond', serif; font-style: italic; }

        /* Watercolor Texture Overlay */
        #app-viewport::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/p6.png');
            opacity: 0.1;
            pointer-events: none;
            z-index: 100;
        }

        /* Background Design Elements */
        .design-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floral-vine {
            position: absolute;
            transition: opacity 2s ease;
            width: 380px; 
            height: auto;
        }

        .top-right {
            top: -10px; right: -50px;
            transform: rotate(5deg);
            opacity: 0.7;
        }

        .bottom-left {
            bottom: -30px; left: -60px;
            transform: scaleX(-1) rotate(-15deg);
            opacity: 0.5;
        }

        /* Glassmorphism Effect */
        .glass {
            background: rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(9.6px);
            border: 1px solid rgba(255, 255, 255, 0.32);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.04);
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: calc(var(--safe-top) + 20px) 1.5rem calc(var(--safe-bottom) + 20px);
            justify-content: space-between;
            position: relative;
            z-index: 20;
        }

        #zip-input {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
        }
        
        .replay-btn {
            font-size: 8px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.2em;
            opacity: 0.2;
            transition: opacity 0.3s;
            cursor: pointer;
            border-bottom: 1px solid transparent;
        }
        .replay-btn:hover { opacity: 0.5; border-color: currentColor; }
    </style>
</head>
<body class="state-normal">

    <!-- Dedication Opening Page -->
    <div id="dedication-screen">
        <div class="content-wrapper">
            <video autoplay muted playsinline id="bloom-video">
                <source src="https://raw.githubusercontent.com/hillelandhashem-tech/transparent-vine.svg/main/shabbat-intro-v3.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>

            <div class="dedication-text">
                <h1 class="playfair text-3xl">For Moriah</h1>
                <p class="playfair-italic text-xl mt-3">my Eishet Chayil</p>
                <p class="playfair-italic text-lg mt-2 opacity-70">ata berka mamesh.</p>
            </div>
        </div>
    </div>

    <div id="phone-mockup">
        <div id="app-viewport" class="relative h-full w-full">
            
            <!-- Design elements fixed behind content -->
            <div class="design-layer">
                <img src="https://raw.githubusercontent.com/hillelandhashem-tech/transparent-vine.svg/main/transparent-vine.svg" id="dec-top" class="floral-vine top-right">
                <img src="https://raw.githubusercontent.com/hillelandhashem-tech/transparent-vine.svg/main/transparent-vine.svg" id="dec-bottom" class="floral-vine bottom-left">
            </div>

            <div id="app" class="h-full w-full transition-all duration-1000">
                
                <!-- Setup View -->
                <div id="setup-view" class="flex flex-col justify-center items-center h-full p-8 text-center relative z-20 overflow-hidden">
                    
                    <!-- Content Stack -->
                    <div class="flex flex-col items-center w-full max-w-xs space-y-12 pb-12">
                        
                        <!-- Title Frost Card -->
                        <div class="glass py-10 px-8 rounded-[3rem] w-full">
                            <h1 class="serif text-5xl tracking-tight text-slate-800 mb-8">The Shabbat App</h1>
                            <p class="cursive text-xl opacity-90 text-slate-700">You made it. Baruch HaShem</p>
                        </div>
                        
                        <!-- Input Section -->
                        <div class="w-full space-y-4">
                            <!-- Darkened label opacity for better visibility -->
                            <label class="text-[10px] uppercase tracking-[0.4em] font-bold opacity-70 block">Where are You?</label>
                            <input type="text" id="zip-input" placeholder="Zip Code" 
                                class="w-full border border-slate-200/50 px-4 py-5 text-3xl text-center focus:outline-none focus:border-sky-200 transition-colors rounded-3xl">
                        </div>
                        
                        <!-- Action Button updated text -->
                        <button onclick="saveSetup()" class="w-full bg-slate-800 text-white py-6 rounded-full font-light tracking-[0.2em] text-lg shadow-xl active:scale-95 transition-all">
                            You're wonderful.
                        </button>

                    </div>

                    <!-- Version tag & Replay -->
                    <div class="absolute bottom-8 w-full text-center flex flex-col items-center gap-2">
                        <button onclick="replayDedication()" class="replay-btn">Replay Intro</button>
                        <p class="text-[9px] opacity-20 tracking-widest uppercase font-bold">Version 5.7</p>
                    </div>
                </div>

                <!-- Dashboard View -->
                <div id="dashboard-view" class="hidden h-full flex flex-col">
                    <div id="app-container">
                        
                        <div class="flex justify-between items-center w-full">
                            <button onclick="showSetup()" class="text-[10px] opacity-40 hover:opacity-100 uppercase tracking-[0.3em] font-bold px-4 py-2 -ml-4 active:bg-black/5 rounded-full transition-all">Settings</button>
                            <div id="location-display" class="text-[10px] font-bold uppercase tracking-[0.3em] opacity-40 text-right">LOCATION</div>
                        </div>

                        <div id="parsha-header" class="text-center pt-8">
                            <div id="parsha-prefix" class="serif text-[10px] uppercase tracking-[0.5em] opacity-40 mb-1">PARSHAT</div>
                            <div id="parsha-name" class="serif text-3xl font-bold tracking-[0.05em] text-slate-800">LOADING...</div>
                        </div>

                        <div class="flex-grow flex flex-col justify-center items-center py-4">
                            <div id="countdown" class="text-center w-full serif leading-none py-2 transition-all tracking-tighter">
                                <!-- Populated by JS -->
                                00:00:00
                            </div>
                        </div>

                        <div class="space-y-10">
                            <div id="times-section" class="py-10 border-y border-slate-900/5 grid grid-cols-3 gap-1 text-center">
                                <div class="space-y-2">
                                    <p class="text-[9px] uppercase opacity-40 font-bold tracking-[0.3em]">Candles</p>
                                    <p id="lighting-time" class="serif text-xl">—:—</p>
                                </div>
                                <div class="space-y-2">
                                    <p class="text-[9px] uppercase opacity-40 font-bold tracking-[0.3em]">Starts</p>
                                    <p id="shabbat-starts" class="serif text-xl">—:—</p>
                                </div>
                                <div class="space-y-2 opacity-40">
                                    <p class="text-[9px] uppercase font-bold tracking-[0.3em]">Havdalah</p>
                                    <p id="havdalah-time" class="serif text-xl">—:—</p>
                                </div>
                            </div>

                            <div id="wisdom-section" class="pb-8">
                                <button id="spark-btn" onclick="toggleWeeklySpark()" class="glass w-full flex flex-col items-center justify-center gap-2 py-8 rounded-[3rem] transition-all active:scale-95">
                                    <span class="serif text-base tracking-[0.15em] text-slate-700">Rebbe's Insight</span>
                                    <span class="text-[9px] uppercase tracking-[0.4em] opacity-30 font-medium tracking-widest">A SPARK OF WISDOM</span>
                                </button>
                                
                                <div class="w-full text-center mt-6">
                                    <button onclick="replayDedication()" class="replay-btn">Replay Intro</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Wisdom Library Overlay -->
    <div id="ai-content-area" onclick="hideWeeklySpark()" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-[#fffcf7]/98 backdrop-blur-md">
        <div class="max-w-xs text-center space-y-8">
            <div id="ai-quote" class="text-2xl cursive leading-relaxed text-slate-700"></div>
            <div id="ai-source" class="text-[11px] uppercase tracking-[0.3em] font-bold opacity-40"></div>
            <p class="text-[9px] opacity-20 uppercase tracking-[0.6em] pt-12">Tap to close</p>
        </div>
    </div>

    <script>
        const wisdomLibrary = [
            { teaching: "Shabbat is not just a day of rest, but a day of re-creation. We don't just stop working; we start being.", source: "Likutei Sichos, Vol. 1" },
            { teaching: "The light of the Shabbat candles reaches into the deepest corners of the soul and the home, bringing peace and harmony.", source: "Sicha, Parshat Vayakhel 1982" },
            { teaching: "When a person prepares for Shabbat during the week, they bring the sanctity of Shabbat into their daily mundane activities.", source: "Toras Menachem, Vol. 5" },
            { teaching: "A single candle can dispel much darkness. Imagine what the collective light of thousands of Shabbat candles can do.", source: "Letter, 1974" },
            { teaching: "Shabbat gives us the strength to transform the entire world into a home for the Divine during the following six days.", source: "Likutei Sichos, Vol. 15" },
            { teaching: "Rest on Shabbat is not for the sake of working better on Monday; it is the goal for which the entire week was created.", source: "Hayom Yom, 14 Kislev" },
            { teaching: "The joy of Shabbat is a taste of the World to Come, where all effort ends and only essence remains.", source: "Likutei Sichos, Vol. 3" },
            { teaching: "Everything we do on Friday is a preparation for the soul to receive its additional dimension on Shabbat.", source: "Toras Menachem, 1951" },
            { teaching: "The atmosphere of Shabbat should be felt even before the day begins, through the peace we bring into our preparations.", source: "Igros Kodesh, Vol. 8" },
            { teaching: "By lighting the candles, the Jewish woman brings the Divine Presence into the physical home.", source: "Sicha, 1980" }
        ];

        let currentZip = localStorage.getItem('shabbat_zip');
        let lightingTime = null; 
        let havdalahTime = null;
        let timerInterval = null;
        let lastRandomIndex = -1;
        let dedicationTimeout = null;

        function runDedicationTimer() {
            if (dedicationTimeout) clearTimeout(dedicationTimeout);
            dedicationTimeout = setTimeout(() => {
                const screen = document.getElementById('dedication-screen');
                screen.style.opacity = '0';
                setTimeout(() => {
                    screen.style.display = 'none';
                }, 1000);
            }, 5000); 
        }

        function replayDedication() {
            const screen = document.getElementById('dedication-screen');
            const video = document.getElementById('bloom-video');
            screen.style.display = 'flex';
            setTimeout(() => {
                screen.style.opacity = '1';
                video.currentTime = 0;
                video.play();
                runDedicationTimer();
            }, 10);
        }

        window.onload = () => { 
            runDedicationTimer();

            if (currentZip) {
                initDashboard(currentZip);
                document.getElementById('zip-input').value = currentZip;
            }
        };

        function saveSetup() {
            const zip = document.getElementById('zip-input').value;
            if (zip.length === 5) {
                localStorage.setItem('shabbat_zip', zip);
                currentZip = zip;
                initDashboard(zip);
            }
        }

        function showSetup() {
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('setup-view').classList.remove('hidden');
        }

        async function initDashboard(zip) {
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            await fetchShabbatTimes(zip);
            startCountdown();
        }

        async function fetchShabbatTimes(zip) {
            try {
                const response = await fetch(`https://www.hebcal.com/shabbat?cfg=json&zip=${zip}&m=42&ash=on`);
                const data = await response.json();
                const lighting = data.items.find(item => item.category === 'candles');
                const havdalah = data.items.find(item => item.category === 'havdalah');
                const parsha = data.items.find(item => item.category === 'parashat');

                if (lighting) {
                    lightingTime = new Date(lighting.date);
                    document.getElementById('lighting-time').innerText = lightingTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    document.getElementById('shabbat-starts').innerText = new Date(lightingTime.getTime() + (18 * 60000)).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
                if (havdalah) {
                    havdalahTime = new Date(havdalah.date);
                    document.getElementById('havdalah-time').innerText = havdalahTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
                if (parsha) {
                    let cleanName = parsha.title.replace(/Parashat|Parashat/gi, '').trim();
                    document.getElementById('parsha-name').innerText = cleanName.toUpperCase();
                }
                document.getElementById('location-display').innerText = (data.location.city || zip).toUpperCase();
            } catch (e) { console.error("Fetch error", e); }
        }

        function startCountdown() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const now = new Date();
                updateDisplay(now);
            }, 1000);
        }

        function updateDisplay(now) {
            const countdownEl = document.getElementById('countdown');
            const dayOfWeek = now.getDay(); 

            if (dayOfWeek === 6 && havdalahTime && now > havdalahTime) {
                countdownEl.innerHTML = `<span style="font-size: 52px; letter-spacing: 0.2em;">SHAVUA TOV</span>`;
                return;
            }

            if (dayOfWeek >= 0 && dayOfWeek <= 4) {
                const daysUntil = (5 - dayOfWeek);
                countdownEl.innerHTML = `
                    <div style="font-size: 140px; font-weight: 700; line-height: 1;">${daysUntil}</div>
                    <div style="font-size: 18px; opacity: 0.85; margin-top: 25px; letter-spacing: 0.1em; font-family: 'Cormorant Garamond', serif; font-style: italic;">${daysUntil === 1 ? 'day' : 'days'} until</div>
                    <div style="font-size: 52px; font-weight: 400; margin-top: 12px; letter-spacing: 0.15em; text-transform: uppercase;">Shabbat</div>
                `;
                return;
            }

            if (dayOfWeek === 5 && lightingTime) {
                const diffMs = lightingTime - now;
                if (diffMs > 0) {
                    const totalSeconds = Math.floor(diffMs / 1000);
                    const h = Math.floor(totalSeconds / 3600);
                    const m = Math.floor((totalSeconds % 3600) / 60);
                    const s = totalSeconds % 60;
                    countdownEl.innerHTML = `<div style="font-size: 72px;">${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}</div>`;
                } else if (diffMs > -1080000) { 
                    const sunsetDiffMs = 1080000 + diffMs;
                    const totalSeconds = Math.floor(sunsetDiffMs / 1000);
                    const m = Math.floor(totalSeconds / 60);
                    const s = totalSeconds % 60;
                    countdownEl.innerHTML = `<div style="font-size: 72px;">${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')} MIN</div>`;
                } else {
                    countdownEl.innerHTML = `<span style="font-size: 42px; letter-spacing: 0.2em;">SHABBAT SHALOM</span>`;
                }
            }
        }

        function toggleWeeklySpark() {
            const area = document.getElementById('ai-content-area');
            let index;
            do { index = Math.floor(Math.random() * wisdomLibrary.length); } while (index === lastRandomIndex);
            lastRandomIndex = index;
            const item = wisdomLibrary[index];
            document.getElementById('ai-quote').innerText = item.teaching;
            document.getElementById('ai-source').innerText = `— ${item.source}`;
            area.classList.remove('hidden');
        }

        function hideWeeklySpark() {
            document.getElementById('ai-content-area').classList.add('hidden');
        }
    </script>
</body>
</html>
